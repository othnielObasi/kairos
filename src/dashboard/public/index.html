<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kairos — Governed Autonomous Capital Runtime</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { margin: 0; width: 100%; min-height: 100%; background: #080b11; }
    body { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; color: #c9d1dc; }
    .loading { display:flex; align-items:center; justify-content:center; min-height:100vh; color:#7c8a9e; font-size:13px; letter-spacing:1px; }
  </style>
</head>
<body>
  <div id="root"><div class="loading">Loading Kairos…</div></div>
  <script type="text/javascript">
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById("root");
      if (el && el.innerHTML === "") {
        el.innerHTML = '<div class="loading" style="padding:24px; text-align:center; flex-direction:column; gap:12px;">' +
          '<div>Runtime error</div>' +
          '<code style="color:#f87171;font-size:11px;">' + String(msg).replace(/</g,"&lt;") + ' (line ' + line + ')</code>' +
          '<br/><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;background:#34d39920;color:#34d399;border:1px solid #34d39940;border-radius:4px;cursor:pointer;font-family:monospace">Reload</button></div>';
      }
    };
    (async function () {
      try {
        const res = await fetch("/dashboard-app.jsx");
        if (!res.ok) throw new Error("Failed to fetch dashboard: " + res.status);
        const code = await res.text();
        const compiled = Babel.transform(code, { presets: ["react", ["env", { modules: "commonjs" }]] }).code;
        const module = { exports: {} };
        const exports = module.exports;
        const require = (name) => {
          if (name === "react") return React;
          throw new Error("Unsupported import: " + name);
        };
        eval(compiled + "\nwindow.__KairosFinal = module.exports.default || exports.default;");
        const App = window.__KairosFinal;
        if (!App) throw new Error("Dashboard component not found");
        ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
      } catch (err) {
        document.getElementById("root").innerHTML =
          '<div class="loading" style="padding:24px; text-align:center; flex-direction:column; gap:12px;">' +
          '<div>Failed to load dashboard</div>' +
          '<code style="color:#f87171; font-size:11px;">' +
          String(err).replace(/</g, "&lt;").replace(/>/g, "&gt;") +
          "</code></div>";
      }
    })();
  </script>
</body>
</html>
